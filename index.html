<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedecode — RL as a Service</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050507;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .page {
      max-width: 1100px;
      width: 100%;
      padding: 80px 40px 60px;
      text-align: center;
    }

    .wordmark {
      font-size: 18px;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #7b6fa6;
      margin-bottom: 56px;
    }

    .stealth-badge {
      display: inline-block;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #a78bfa;
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: rgba(139, 92, 246, 0.08);
      padding: 10px 28px;
      border-radius: 100px;
      margin-bottom: 56px;
    }

    h1 {
      font-size: clamp(32px, 5.5vw, 76px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 36px;
      white-space: nowrap;
    }

    .subtitle {
      font-size: clamp(18px, 2.2vw, 22px);
      color: #9ca3af;
      line-height: 1.8;
      margin-bottom: 72px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .divider {
      width: 56px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 0 auto 48px;
    }

    .contact {
      font-size: clamp(16px, 1.8vw, 20px);
      color: #9ca3af;
      margin-top: 20px;
    }

    .contact a {
      color: #a78bfa;
      text-decoration: none;
    }

    .contact a:hover {
      color: #c4b5fd;
    }

    .cta-btn {
      display: inline-block;
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      background: rgba(124, 58, 237, 0.85);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: background 0.2s, border-color 0.2s;
    }

    .cta-btn:hover {
      background: rgba(139, 92, 246, 1);
      border-color: rgba(167, 139, 250, 0.6);
    }

    .footer {
      margin-top: 80px;
      padding-top: 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .footer p {
      font-size: 14px;
      color: #374151;
    }

    @media (max-width: 768px) {
      .page { padding: 60px 28px 48px; }
      .wordmark { font-size: 16px; letter-spacing: 6px; margin-bottom: 44px; }
      .stealth-badge { font-size: 12px; padding: 8px 22px; margin-bottom: 44px; }
      h1 { white-space: normal; }
      .subtitle { margin-bottom: 56px; }
    }

    @media (max-width: 480px) {
      .page { padding: 48px 20px 40px; }
      .wordmark { font-size: 14px; letter-spacing: 5px; margin-bottom: 36px; }
      .stealth-badge { font-size: 11px; letter-spacing: 3px; padding: 7px 18px; margin-bottom: 36px; }
      .footer { margin-top: 56px; }
      .footer p { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="wordmark">Wedecode</div>

    <div class="stealth-badge">Stealth Mode</div>

    <h1>Building RL-Infra as a Service</h1>

    <p class="subtitle">
      Partnered with AI labs in SF and NYC.<br />
      We find every checkpoint where your agents and models break — so you ship ones that don't.
    </p>

    <div class="divider"></div>

    <a href="https://calendly.com/prajwal-wedecode/30min" target="_blank" rel="noopener" class="cta-btn">Schedule a Call</a>

    <p class="contact">Get in touch: <a href="mailto:info@wedecode.io">info@wedecode.io</a></p>

    <div class="footer">
      <p>&copy; 2026 Wedecode. All rights reserved.</p>
    </div>

  </div>
</body>
</html>
